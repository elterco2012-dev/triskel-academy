<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 / 8 / 12 / 16 / 24 progression" viewport="700x240" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<style>
  .row { display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .bar { background:var(--brand-violet);height:14px;border-radius:3px;}
  .lbl { font:600 12px/1.2 var(--font-sans);color:var(--fg);min-width:80px;}
  .hx { font:11px/1.2 ui-monospace,monospace;color:var(--fg-muted);}
</style>
<div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px;"></div><div class="hx">4px</div></div>
<div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px;"></div><div class="hx">8px</div></div>
<div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px;"></div><div class="hx">12px</div></div>
<div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px;"></div><div class="hx">16px</div></div>
<div class="row"><div class="lbl">space-5</div><div class="bar" style="width:20px;"></div><div class="hx">20px</div></div>
<div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px;"></div><div class="hx">24px</div></div>
<div class="row"><div class="lbl">space-7</div><div class="bar" style="width:32px;"></div><div class="hx">32px</div></div>
<div class="row"><div class="lbl">space-8</div><div class="bar" style="width:40px;"></div><div class="hx">40px</div></div></body></html>
