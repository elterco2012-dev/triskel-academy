<!DOCTYPE html>
<!-- @dsCard group="Type" name="Labels & captions" subtitle="Section labels, captions, metric numbers" viewport="700x200" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Labels & captions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<div style="display:grid;grid-template-columns:auto 1fr;gap:10px 24px;align-items:baseline;">
  <div class="ds-label">SECTION LABEL</div>
  <div style="font:var(--type-caption);">.ctitle · 11px · uppercase · letter-spacing .06em · muted</div>

  <div class="ds-caption">Caption / hint text</div>
  <div style="font:var(--type-caption);">11px · DM Sans 400 · muted</div>

  <div style="font:var(--type-button);color:var(--fg);">Button label</div>
  <div style="font:var(--type-caption);">13px · DM Sans 500</div>

  <div class="ds-metric">12.500</div>
  <div style="font:var(--type-caption);">.mval · 1.5rem · DM Sans 700 · metric numbers</div>
</div></body></html>
