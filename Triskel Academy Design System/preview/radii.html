<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="sm 6 · default 9 · lg 14 · bottomsheet · pill" viewport="700x170" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<style>
  .grid { display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw { display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box { width:64px;height:64px;background:var(--brand-violet-tint);border:1.5px solid var(--brand-violet);}
  .nm { font:600 11px/1.2 var(--font-sans);color:var(--fg);}
  .hx { font:11px/1.2 ui-monospace,monospace;color:var(--fg-muted);}
</style>
<div class="grid">
  <div class="sw"><div class="box" style="border-radius:6px;"></div><div class="nm">sm</div><div class="hx">6px</div></div>
  <div class="sw"><div class="box" style="border-radius:9px;"></div><div class="nm">default</div><div class="hx">9px</div></div>
  <div class="sw"><div class="box" style="border-radius:14px;"></div><div class="nm">lg</div><div class="hx">14px</div></div>
  <div class="sw"><div class="box" style="border-radius:20px 20px 0 0;"></div><div class="nm">bottomsheet</div><div class="hx">20 / 0</div></div>
  <div class="sw"><div class="box" style="border-radius:9999px;width:88px;height:24px;"></div><div class="nm">pill</div><div class="hx">∞</div></div>
</div></body></html>
