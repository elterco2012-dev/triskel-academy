<!DOCTYPE html>
<!-- @dsCard group="Type" name="Body type" subtitle="DM Sans 400/500/600/700 — UI" viewport="700x240" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 24px;align-items:baseline;">
  <div style="font:var(--type-body);color:var(--fg);">Body 13 / DM Sans 400</div>
  <div style="font:var(--type-caption);">teacher panel default</div>

  <div style="font:var(--type-body-lg);color:var(--fg);">Body 15 / DM Sans 400</div>
  <div style="font:var(--type-caption);">student panel default</div>

  <div style="font:500 13px/1.5 var(--font-sans);color:var(--fg);">Medium 13 / DM Sans 500</div>
  <div style="font:var(--type-caption);">student names, schedule mod</div>

  <div style="font:600 13px/1.5 var(--font-sans);color:var(--fg);">Semibold 13 / DM Sans 600</div>
  <div style="font:var(--type-caption);">card titles in student panel</div>

  <div style="font:700 15px/1.2 var(--font-sans);color:var(--fg);">Bold 15 / DM Sans 700</div>
  <div style="font:var(--type-caption);">profile name, pago estado</div>
</div></body></html>
