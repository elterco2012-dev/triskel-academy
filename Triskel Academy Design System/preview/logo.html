<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Tri-color triskel mark, always in circle" viewport="700x160" -->

    <img src="../assets/logo-triskel.png" style="width:36px;height:36px;border-radius:50%;object-fit:cover;background:#fff;">
