<!DOCTYPE html>
<!-- @dsCard group="Components" name="Cards" subtitle="Flat (teacher), shadow (student), left-accent" viewport="700x280" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<style>
  .grid { display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card-flat { background:#fff;border:1px solid rgba(0,0,0,0.07);border-radius:14px;padding:14px;}
  .card-shadow { background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 12px rgba(108,91,123,0.10);}
  .card-accent { background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 12px rgba(108,91,123,0.10);border-left:4px solid #1D9E75;}
  .ctitle { font:600 11px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);margin-bottom:8px;}
  .mval { font:var(--type-metric);color:var(--brand-violet);}
  .mlabel { font:var(--type-caption);}
</style>
<div class="grid">
  <div class="card-flat">
    <div class="mlabel">Alumnas activas</div>
    <div class="mval">23</div>
    <div class="mlabel" style="font-size:10px;margin-top:6px;color:var(--fg-faint);">Flat · teacher panel</div>
  </div>
  <div class="card-shadow">
    <div class="ctitle">📋 Mi inscripción</div>
    <div style="font:500 13px/1.4 var(--font-sans);">Reformer · Plan 2 días</div>
    <div class="mlabel" style="margin-top:6px;color:var(--fg-faint);">Shadow · student panel</div>
  </div>
  <div class="card-accent" style="grid-column:1/-1;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="font-size:28px;">✅</div>
      <div>
        <div style="font:var(--type-caption);">Cuota noviembre 2025</div>
        <div style="font:700 16px/1.3 var(--font-sans);color:#1D9E75;">¡Pagada!</div>
      </div>
    </div>
    <div class="mlabel" style="margin-top:6px;color:var(--fg-faint);">Accent card · 4px modality/status border-left</div>
  </div>
</div></body></html>
