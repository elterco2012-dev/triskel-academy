<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Iconography (current)" subtitle="Emoji as icons — production state" viewport="700x260" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iconography (current)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .card-wrap { width: 100%; }
  /* prevent body min-height from inflating cards */
</style>
</head>
<body>
<style>
  .grid { display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .ico { display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:9px;background:#F8F8F6;}
  .gly { font-size:24px;}
  .nm { font:11px/1.2 var(--font-sans);color:var(--fg-muted);}
</style>
<div class="grid">
  <div class="ico"><div class="gly">🏠</div><div class="nm">Inicio</div></div>
  <div class="ico"><div class="gly">👤</div><div class="nm">Alumnas</div></div>
  <div class="ico"><div class="gly">📅</div><div class="nm">Horarios</div></div>
  <div class="ico"><div class="gly">📝</div><div class="nm">Planificar</div></div>
  <div class="ico"><div class="gly">📚</div><div class="nm">Historial</div></div>
  <div class="ico"><div class="gly">💰</div><div class="nm">Pagos</div></div>
  <div class="ico"><div class="gly">💳</div><div class="nm">Cuota</div></div>
  <div class="ico"><div class="gly">💬</div><div class="nm">WhatsApp</div></div>
  <div class="ico"><div class="gly">🌿</div><div class="nm">Brand sign</div></div>
  <div class="ico"><div class="gly">⚠️</div><div class="nm">Aviso</div></div>
  <div class="ico"><div class="gly">✅</div><div class="nm">OK</div></div>
  <div class="ico"><div class="gly">🌙</div><div class="nm">Modo oscuro</div></div>
</div>
<div style="margin-top:10px;font:var(--type-caption);">⚠️ Emoji as icon set — current production. Substitute with Lucide for "more professional" feel.</div></body></html>
