<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inicio · Actual vs. Propuesta — Triskel</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="teacher-panel.css">
<style>
  html, body { margin: 0; height: 100%; }
  /* Each artboard frames a teacher panel render. Lock the inner app height. */
  .ab-frame { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  .ab-frame .tp-shell { height: 100%; }
  .ab-frame .tp-main { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="InicioActual.jsx"></script>
<script type="text/babel" src="InicioPropuesta.jsx"></script>

<script type="text/babel">
function App() {
  const W = 1040, H = 1180;
  return (
    <DesignCanvas>
      <DCSection id="inicio" title="Pantalla de Inicio" subtitle="Comparación lado a lado · misma data, distinta jerarquía visual">
        <DCArtboard id="actual" label="ACTUAL · reconstruida de tus capturas" width={W} height={H}>
          <div className="ab-frame"><InicioActual /></div>
        </DCArtboard>
        <DCArtboard id="propuesta" label="PROPUESTA · disciplina cromática + acciones claras" width={W} height={H}>
          <div className="ab-frame"><InicioPropuesta /></div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
