<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#7C5CBF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Triskel Academy · Mi Cuenta</title>
<link rel="manifest" href="/panel/manifest.json">
<link rel="icon" href="/panel/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --tm:#7C5CBF;--mat:#27ae60;--ref:#2980b9;--fun:#e67e22;
  --rd:#e74c3c;--bg:#f4f0f8;--white:#fff;--txt:#1a1a2e;--sub:#6b7280;
  --border:#e8e0f0;--border-light:#f0ebf5;
  --card-shadow:0 2px 12px rgba(108,91,123,.10);
  --radius:12px;--radius-sm:8px;
}
[data-theme=dark]{
  --bg:#111110;--white:#1e1c1b;--txt:#f0ede8;--sub:#9ca3af;
  --border:rgba(255,255,255,.10);--border-light:rgba(255,255,255,.06);
  --card-shadow:0 2px 10px rgba(0,0,0,.45);
  --tm:#9b7ed4;--mat:#4ade80;--rd:#f87171;
}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;max-width:480px;margin:0 auto;}
input,select,textarea,button{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

/* ── AUTH SCREEN ── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem;background:var(--bg);}
.auth-logo{font-size:48px;margin-bottom:.5rem;}
.auth-title{font-size:22px;font-weight:700;color:var(--tm);margin-bottom:.25rem;text-align:center;}
.auth-sub{font-size:13px;color:var(--sub);margin-bottom:2rem;text-align:center;}
.auth-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:1.5rem;width:100%;max-width:340px;}
.auth-card label{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:.25rem;margin-top:.75rem;}
.auth-card input{width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;outline:none;transition:border .2s;background:var(--white);color:var(--txt);}
.auth-card input:focus{border-color:var(--tm);}
.auth-card .btn-primary{width:100%;margin-top:1.2rem;padding:.75rem;background:var(--tm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.auth-card .btn-primary:active{opacity:.85;}
#auth-error{color:var(--rd);font-size:13px;margin-top:.75rem;text-align:center;display:none;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100dvh;}

/* ── HEADER ── */
.app-header{background:var(--white);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;box-shadow:0 1px 0 var(--border);position:sticky;top:0;z-index:50;}
.header-logo{width:36px;height:36px;border-radius:50%;background:var(--tm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;color:var(--tm);}
.header-sub{font-size:11px;color:var(--sub);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
.icon-btn{width:36px;height:36px;border:none;background:transparent;font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.icon-btn:active{background:#f0ebf5;}

/* ── CONTENT ── */
.content{flex:1;padding:1rem;padding-bottom:80px;overflow-y:auto;}

/* ── NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem .25rem .4rem;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--sub);gap:2px;transition:color .15s;}
.nav-item.active{color:var(--tm);}
.nav-item .nav-icon{font-size:20px;}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:1rem;margin-bottom:.75rem;}
.card-title{font-size:13px;font-weight:700;color:var(--tm);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}

/* ── PROFILE ── */
.profile-photo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1rem;}
.profile-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--tm);background:#e8dff0;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;}
.profile-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.photo-btn{margin-top:.5rem;font-size:12px;color:var(--tm);background:none;border:1px solid var(--tm);border-radius:20px;padding:.2rem .75rem;cursor:pointer;}
.profile-name{font-size:18px;font-weight:700;color:var(--txt);text-align:center;margin-top:.5rem;}
.profile-email{font-size:12px;color:var(--sub);text-align:center;}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border-light);font-size:13px;}
.profile-row:last-child{border-bottom:none;}
.profile-label{color:var(--sub);font-size:12px;}
.profile-val{font-weight:600;color:var(--txt);}

/* ── BADGE CHIPS ── */
.chip{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:11px;font-weight:700;}
.chip-mat{background:#e8f5e9;color:#27ae60;}
.chip-ref{background:#e3f2fd;color:#2980b9;}
.chip-fun{background:#fff3e0;color:#e67e22;}
.chip-ok{background:#e8f5e9;color:#27ae60;}
.chip-pend{background:#fff8e1;color:#f59e0b;}
.chip-no{background:#fce4ec;color:#e74c3c;}

/* ── SCHEDULE ITEM ── */
.sched-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border-light);}
.sched-item:last-child{border-bottom:none;}
.sched-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sched-info{flex:1;}
.sched-mod{font-size:13px;font-weight:600;color:var(--txt);}
.sched-dia{font-size:11px;color:var(--sub);margin-top:1px;}

/* ── PAGO CARD ── */
.pago-mes{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;}
.pago-estado{font-size:22px;font-weight:800;margin:.25rem 0;}
.pago-estado.cobrado{color:var(--mat);}
.pago-estado.pendiente{color:#f59e0b;}
.pago-estado.aviso{color:#f59e0b;}
.pago-estado.sin-pago{color:var(--sub);}
.btn-page{padding:.65rem 1.2rem;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-pague{background:var(--tm);color:#fff;width:100%;}
.btn-pague:active{opacity:.85;}
.btn-pague:disabled{background:#bbb;cursor:default;}

/* ── HISTORIAL ── */
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border-light);font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-mes{font-weight:600;}
.hist-monto{color:var(--mat);font-weight:700;}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:13px;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;max-height:80dvh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .75rem;}
.modal-title{font-size:16px;font-weight:700;color:var(--tm);margin-bottom:1rem;}
.modal-label{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:.25rem;display:block;margin-top:.75rem;}
.modal-input{width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;outline:none;background:var(--white);color:var(--txt);}
.modal-input:focus{border-color:var(--tm);}
.modal-row{display:flex;gap:.75rem;margin-top:1rem;}
.btn-cancel{flex:1;padding:.65rem;border:1.5px solid var(--border);border-radius:10px;background:var(--white);color:var(--txt);font-size:14px;cursor:pointer;font-weight:600;}
.btn-confirm{flex:2;padding:.65rem;border:none;border-radius:10px;background:var(--tm);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.btn-confirm:active{opacity:.85;}

/* ── NOTIF BANNER ── */
.notif-banner{background:var(--tm);border-radius:var(--radius);padding:1rem;color:#fff;margin-bottom:.75rem;display:flex;align-items:center;gap:.75rem;}
.notif-banner .ico{font-size:28px;}
.notif-banner .txt{flex:1;}
.notif-banner .txt strong{display:block;font-size:14px;margin-bottom:.2rem;}
.notif-banner .txt span{font-size:12px;opacity:.9;}
.notif-banner .btn-notif{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.6);color:#fff;padding:.4rem .85rem;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.notif-banner .btn-notif:active{opacity:.75;}

/* ── MOTIVO CHIPS ── */
.motivo-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin:.5rem 0 .75rem;}
.motivo-chip{padding:.35rem .8rem;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;background:var(--white);color:var(--sub);cursor:pointer;transition:all .15s;}
.motivo-chip.sel{border-color:var(--tm);background:var(--tm);color:#fff;}

/* ── AUSENCIA INSC OPTION ── */
.ausencia-insc-opt{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.4rem;cursor:pointer;transition:all .15s;}
.ausencia-insc-opt.sel{border-color:var(--tm);background:#f0ebf8;}

/* ── BOTÓN AUSENCIA ── */
.btn-ausencia{width:100%;background:#fff7ed;border:2px solid #f97316;color:#c2410c;padding:.75rem 1rem;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:.75rem;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.3;transition:opacity .15s;}
.btn-ausencia .btn-ausencia-sub{font-size:11px;font-weight:400;color:#9a3412;opacity:.85;}
.btn-ausencia:active{opacity:.8;}
[data-theme=dark] .btn-ausencia{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.5);color:#fb923c;}
[data-theme=dark] .btn-ausencia .btn-ausencia-sub{color:rgba(251,146,60,.7);opacity:1;}

/* ── CHIPS (dark mode) ── */
[data-theme=dark] .chip-mat{background:rgba(39,174,96,.15);color:#4ade80;}
[data-theme=dark] .chip-ref{background:rgba(41,128,185,.15);color:#60a5fa;}
[data-theme=dark] .chip-fun{background:rgba(230,126,34,.15);color:#fb923c;}
[data-theme=dark] .chip-ok{background:rgba(39,174,96,.15);color:#4ade80;}
[data-theme=dark] .chip-pend{background:rgba(245,158,11,.15);color:#fbbf24;}
[data-theme=dark] .chip-no{background:rgba(231,76,60,.15);color:#f87171;}
[data-theme=dark] .ausencia-insc-opt.sel{background:rgba(155,126,212,.15);}
[data-theme=dark] .icon-btn:active{background:rgba(255,255,255,.08);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--sub);font-size:14px;}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--tm);border-radius:50%;animation:spin .7s linear infinite;margin-right:.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="auth-screen">
  <img src="/panel/logo-triskel.png" class="auth-logo" style="width:80px;height:80px;object-fit:contain;">

    <button class="nav-item active" onclick="navTo('inicio')" id="nav-inicio">

    <button class="nav-item" onclick="navTo('pagos')" id="nav-pagos">

    </button>
    <button class="nav-item" onclick="navTo('salud')" id="nav-salud">

</div>

<!-- ── MODAL AVISO PAGO ── -->
<div id="modal-pago" style="display:none;" class="modal-overlay" onclick="if(event.target===this)cerrarModalPago()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">💳 Avisar pago</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:.5rem;">Completá los datos de tu pago y Amira lo confirmará.</div>
    <div id="modal-pago-mes-label" style="font-size:13px;font-weight:600;color:var(--tm);margin-bottom:.5rem;"></div>
    <label class="modal-label">Monto abonado <span style="font-weight:400;color:#aaa;">(podés modificarlo si pagás menos)</span></label>
    <input class="modal-input" type="number" id="aviso-monto" placeholder="0" min="0">
    <label class="modal-label">Medio de pago</label>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button id="medio-transferencia" onclick="seleccionarMedio('transferencia')" type="button"
        style="flex:1;padding:.6rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;font-weight:600;background:var(--white);color:var(--sub);cursor:pointer;transition:all .15s;">
        🏦 Transferencia
      </button>
      <button id="medio-efectivo" onclick="seleccionarMedio('efectivo')" type="button"
        style="flex:1;padding:.6rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;font-weight:600;background:var(--white);color:var(--sub);cursor:pointer;transition:all .15s;">
        💵 Efectivo
      </button>
    </div>
    <label class="modal-label">Nota (opcional)</label>
    <input class="modal-input" type="text" id="aviso-nota" placeholder="Ej: operación 123456" maxlength="200">
    <div class="modal-row">
      <button class="btn-cancel" onclick="cerrarModalPago()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarAviso()">Avisar pago ✓</button>
    </div>
    <div style="margin-top:1rem;padding:.75rem;background:var(--bg);border-radius:var(--radius-sm);text-align:center;">
      <div style="font-size:11px;color:var(--sub);margin-bottom:.3rem;">Datos para transferir</div>
      <div style="font-size:14px;font-weight:700;color:var(--tm);letter-spacing:.02em;">Triskelcasares1</div>
      <div style="font-size:12px;color:var(--sub);margin-top:.15rem;">Titular: Lorena Montiel</div>
    </div>
  </div>
</div>

<!-- ── MODAL AUSENCIA ── -->
<div id="modal-ausencia" style="display:none;" class="modal-overlay" onclick="if(event.target===this)cerrarModalAusencia()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🙁 No voy a poder ir</div>
    <div id="modal-ausencia-inscs" style="margin-bottom:.75rem;"></div>
    <label class="modal-label">Motivo (opcional)</label>
    <div class="motivo-chips">
      <button class="motivo-chip" onclick="selMotivo('Me enfermé')">🤒 Me enfermé</button>
      <button class="motivo-chip" onclick="selMotivo('Trabajo')">💼 Trabajo</button>
      <button class="motivo-chip" onclick="selMotivo('Viaje')">✈️ Viaje</button>
      <button class="motivo-chip" onclick="selMotivo('Lesión / dolor')">🤕 Lesión/dolor</button>
    </div>
    <input class="modal-input" id="ausencia-motivo-texto" type="text" placeholder="O escribí el motivo..." maxlength="200" oninput="limpiarChips()">
    <div class="modal-row">
      <button class="btn-cancel" onclick="cerrarModalAusencia()">Cancelar</button>
      <button class="btn-confirm" id="btn-confirmar-ausencia" onclick="confirmarAusencia()">Avisar ausencia</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
const SB_URL='https://dplzkrdgnynyyunmrawr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwbHprcmRnbnlueXl1bm1yYXdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjg2OTMsImV4cCI6MjA5NDYwNDY5M30.B-J4yJf1lnyR0isMeaCIKHeCCRd7mJe1Do-_6yxbVow';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{storageKey:'tk-alumna-auth'}});

const VAPID_PUBLIC='BEXtjaNEQhKEN8rEGQAp0NhcpFsAfl7vWrTCJTMUdOrNf6iOvmkdFIUEOcchkkNoJoixRdqLheqrIkjwQEAIw28';

const MOD_COLORS={mat:'#27ae60',reformer:'#2980b9',funcional:'#e67e22'};
const MOD_CHIP={mat:'chip-mat',reformer:'chip-ref',funcional:'chip-fun'};
const DIA_LABEL={lun:'Lunes',mar:'Martes',mie:'Miércoles',jue:'Jueves',vie:'Viernes'};
const DIA_ORDER={lun:0,mar:1,mie:2,jue:3,vie:4};

let STATE={};  // ficha data: alumna, inscripciones, pagos, avisos
let curPage='inicio';
let avisoPagoMes='';
let _showAllPagos=false;
function toggleAllPagos(){_showAllPagos=!_showAllPagos;renderPagos();}

// ── AUTH ────────────────────────────────────────────────────────────────────

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.querySelector('#auth-screen .btn-primary');
  errEl.style.display='none';
  if(!email||!pass){errEl.textContent='Completá email y contraseña.';errEl.style.display='block';return;}
  try{
    if(btn){btn.disabled=true;btn.textContent='Ingresando…';}
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){errEl.textContent='Email o contraseña incorrectos.';errEl.style.display='block';return;}
    await initApp();
  }catch(e){
    errEl.textContent='Error de conexión. Revisá tu internet e intentá de nuevo.';
    errEl.style.display='block';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Ingresar';}
  }
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ── INIT ─────────────────────────────────────────────────────────────────────

async function initApp(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){document.getElementById('auth-screen').style.display='flex';return;}

  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';

  await loadFicha();
}

async function loadFicha(){
  const{data,error}=await sb.rpc('triskel_get_mi_ficha');
  if(error||!data?.ok){
    // RPC missing (migration not run yet) or account not linked
    const msg=error?.message||'';
    const noRpc=msg.includes('function')||msg.includes('exist');
    setContent(`<div class="card" style="text-align:center;padding:2rem;">
      <div style="font-size:32px;margin-bottom:.5rem;">${noRpc?'⚙️':'🔗'}</div>
      <div style="font-size:14px;color:var(--sub);">${noRpc
        ?'El panel está siendo configurado.<br>Intentá de nuevo en unos minutos.'
        :'Tu cuenta no está vinculada aún.<br>Pedile a Amira que la active.'}</div>
      <button onclick="loadFicha()" style="margin-top:1rem;padding:.5rem 1.2rem;background:var(--tm);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">↺ Reintentar</button>
    </div>`);
    return;
  }
  STATE=data;
  STATE.ficha_salud=null;
  document.getElementById('header-nombre').textContent=STATE.alumna?.nombre||'';
  updatePagoBadge();
  // Load ficha de salud in parallel (non-blocking if RPC doesn't exist yet)
  sb.rpc('triskel_get_mi_ficha_salud').then(({data:fs})=>{
    STATE.ficha_salud=fs||null;
    updateSaludBadge();
  }).catch(()=>{});
  navTo('inicio');
}

function updateSaludBadge(){
  const icon=document.getElementById('nav-salud-icon');
  if(!icon)return;
  if(!STATE.ficha_salud){icon.textContent='📋';}
  else{icon.textContent='✅';}
}

function updatePagoBadge(){
  const mesActual=new Date().toISOString().slice(0,7);
  const pagos=STATE.pagos||[];
  const avisos=STATE.avisos||[];
  const cobrado=pagos.find(p=>p.mes===mesActual&&p.pagado);
  const aviso=avisos.find(av=>av.mes===mesActual&&av.estado==='pendiente');
  const icon=document.getElementById('nav-pagos-icon');
  if(!cobrado&&aviso){icon.textContent='🔔';}
  else if(!cobrado){icon.textContent='⚠️';}
  else{icon.textContent='💳';}
}

// ── NAV ──────────────────────────────────────────────────────────────────────

function navTo(page){
  if(page==='horarios') page='inicio'; // Horarios integrado en Inicio
  curPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  switch(page){
    case 'inicio':      renderInicio();break;
    case 'pagos':       renderPagos();break;
    case 'salud':       renderSalud();break;
    case 'perfil':      renderPerfil();break;
  }
}

        <div style="text-align:left;">
          <div style="font-size:10px;opacity:.75;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.15rem;">Alias para transferir</div>
          <div style="font-size:15px;font-weight:700;letter-spacing:.02em;">Triskelcasares1</div>
          <div style="font-size:11px;opacity:.75;">Lorena Montiel</div>

        <button onclick="copiarAlias()" id="btn-copiar-alias" style="background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);border-radius:8px;color:#fff;font-size:12px;font-weight:600;padding:.45rem .8rem;cursor:pointer;white-space:nowrap;flex-shrink:0;">📋 Copiar</button>

  // Mis clases (compact, agrupado por plan)
  let misClasesCard='';
  if(inscs.length){
    const plans={};
    inscs.forEach(i=>{
      const key=`${i.modalidad}|${i.horario||''}`;

    misClasesCard=`<div class="card">

  const notifCard=rNotifBanner({suppressDefault:!cobrado&&!aviso, showActive:false});

  setContent(notifCard+pagoCard+proximaCard+noVoyBtn+misClasesCard);

function renderHorarios(){

  if(!inscs.length){

  // Group by plan: same modalidad + horario = same plan with multiple days
  const plans={};

    if(!plans[key])plans[key]={modalidad:i.modalidad,horario:i.horario||'',dias:[],plan_nombre:i.plan_nombre||null};
    plans[key].dias.push(i.dia);
  });
  const modOrder={reformer:0,mat:1,funcional:2};
  const sorted=Object.values(plans).sort((a,b)=>(modOrder[a.modalidad]||0)-(modOrder[b.modalidad]||0));

  let html='';
  sorted.forEach(p=>{
    const diasLabel=p.dias.sort((a,b)=>DIA_ORDER[a]-DIA_ORDER[b]).map(d=>DIA_LABEL[d]||d).join(' y ');
    html+=`<div class="card">
      <div style="display:flex;align-items:center;gap:.9rem;">

          <div class="sched-dia" style="font-weight:600;margin-top:.15rem;">📅 ${diasLabel}</div>
        </div>
      </div>
    </div>`;
  });
  setContent(html);
}

// ── PAGOS ─────────────────────────────────────────────────────────────────────

function renderPagos(){
  if(!STATE.alumna){setContent('<div class="loading"><div class="spinner"></div></div>');return;}
  const pagos=STATE.pagos||[];
  const avisos=STATE.avisos||[];
  const mesActual=new Date().toISOString().slice(0,7);

  const mesLabel=mesStr=>{ const[y,m]=mesStr.split('-');return new Date(y,m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'}); };

  const cobradoActual=pagos.some(p=>p.mes===mesActual&&p.pagado);
  const avisoActual=avisos.some(av=>av.mes===mesActual&&av.estado==='pendiente');

  // CTA solo si el mes actual no está pagado ni en revisión
  const ctaHtml=(!cobradoActual&&!avisoActual)
    ?`<button class="btn-page btn-pague" onclick="abrirModalPago('${mesActual}')" style="width:100%;margin-bottom:1rem;">💳 Avisar que pagué — ${mesLabel(mesActual)}</button>`
    :'';

  // Lista unificada: todos los meses del historial + mes actual si no está
  const allMeses=new Set([mesActual,...pagos.map(p=>p.mes)]);
  const mesesOrdenados=[...allMeses].sort((a,b)=>b.localeCompare(a));

  function filaHTML(mes){
    const pagosMes=pagos.filter(p=>p.mes===mes);
    const avisoMes=avisos.find(av=>av.mes===mes);
    const pagado=pagosMes.some(p=>p.pagado);
    const enRevision=avisos.some(av=>av.mes===mes&&av.estado==='pendiente');
    const total=pagosMes.filter(p=>p.pagado).reduce((s,p)=>s+(p.monto||0),0);
    const nota=pagosMes.find(p=>p.nota)?.nota||avisoMes?.nota||null;
    const fechaPago=pagosMes.find(p=>p.fecha_pago)?.fecha_pago||null;
    const esMesActual=mes===mesActual;
    let borde,estado;
    if(pagado){borde='var(--mat)';estado='✅ Pagada';}
    else if(enRevision){borde='#f59e0b';estado='⏳ En revisión';}
    else if(esMesActual){borde='var(--rd)';estado='⚠️ Pendiente';}
    else{borde='var(--b)';estado='— Sin registro';}
    return`<div class="hist-row" style="border-left:3px solid ${borde};padding-left:.75rem;flex-direction:column;align-items:flex-start;gap:2px;">
      <div style="display:flex;width:100%;align-items:center;">
        <div style="flex:1;">
          <div class="hist-mes">${mesLabel(mes)}${esMesActual?` <span style="font-size:10px;color:var(--tm);font-weight:400;">(este mes)</span>`:''}</div>
          ${fechaPago?`<div style="font-size:11px;color:var(--sub);">Registrado ${new Date(fechaPago).toLocaleDateString('es-AR')}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${total?`<div class="hist-monto">$${total.toLocaleString('es-AR')}</div>`:''}
          <div style="font-size:12px;color:var(--sub);">${estado}</div>
        </div>
      </div>
      ${nota?`<div style="font-size:11px;color:var(--sub);font-style:italic;">"${nota}"</div>`:''}
    </div>`;
  }

  const MAX_PAGOS=6;
  const visibles=_showAllPagos?mesesOrdenados:mesesOrdenados.slice(0,MAX_PAGOS);
  const extra=mesesOrdenados.length-MAX_PAGOS;
  const filas=visibles.map(filaHTML).join('');
  const verMasBtn=(!_showAllPagos&&extra>0)
    ?`<button onclick="toggleAllPagos()" style="width:100%;padding:.6rem;margin-top:.25rem;background:none;border:1px solid var(--b);border-radius:var(--radius-sm);font-size:12px;color:var(--sub);cursor:pointer;">Ver ${extra} pago${extra!==1?'s':''} anterior${extra!==1?'es':''} ↓</button>`
    :(_showAllPagos&&extra>0?`<button onclick="toggleAllPagos()" style="width:100%;padding:.6rem;margin-top:.25rem;background:none;border:1px solid var(--b);border-radius:var(--radius-sm);font-size:12px;color:var(--sub);cursor:pointer;">▲ Ver menos</button>`:'');

  setContent(ctaHtml+`<div class="card"><div class="card-title">💰 Mis pagos</div>${filas}${verMasBtn}</div>`);
}

function toggleFichaBool(field,val){

  else STATE.ficha_salud[field]=val;
  renderSalud();
}

    p_dolor_cronico:f.dolor_cronico||null,p_actividad_fisica:f.actividad_fisica??null,
    p_actividad_frecuencia:f.actividad_frecuencia||null,p_fumadora:f.fumadora??null,
    p_colesterol_alto:f.colesterol_alto??null,p_convulsiones:f.convulsiones??null,
    p_diabetes:f.diabetes??null,
    p_alergia_medicamento:f.alergia_medicamento||null,p_toma_medicamento:f.toma_medicamento||null,
    p_afecciones_cardiacas:f.afecciones_cardiacas||null,p_afecciones_respiratorias:f.afecciones_respiratorias||null,
    p_datos_importantes:f.datos_importantes||null,p_antecedentes_familiares:f.antecedentes_familiares||null,

  if(error){
    if(btn){btn.disabled=false;btn.textContent='Guardar ficha ✓';}

  // Reload

  updateSaludBadge();
  if(btn){btn.disabled=false;btn.textContent='Guardar ficha ✓';}

    }).catch(()=>{});

}

// ── NOTIFICATION BANNER ───────────────────────────────────────────────────────
const NOTIF_SNOOZE_KEY='triskel_notif_snooze';

function rNotifBanner(opts={}){
  // opts puede ser boolean (legacy suppressDefault) u objeto {suppressDefault, showActive}
  if(typeof opts==='boolean') opts={suppressDefault:opts};
  const {suppressDefault=false, showActive=false}=opts;
  if(!('Notification' in window)||!('serviceWorker' in navigator))return'';
  const perm=Notification.permission;

  if(perm==='granted'){
    // Solo mostrar el badge verde cuando se pide explícitamente (Perfil)
    if(!showActive) return'';
    return`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem;">
      <span style="font-size:20px;">✅</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:#15803d;">Notificaciones activas</div>
        <div style="font-size:11px;color:#166534;">Vas a recibir recordatorios de pago y confirmaciones</div>
      </div>
    </div>`;
  }

  if(perm==='denied'){
    return`<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem;">
      <span style="font-size:20px;">🔕</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:#9a3412;">Notificaciones bloqueadas</div>
        <div style="font-size:11px;color:#7c2d12;">Habilitá los permisos en Configuración del navegador para recibirlas</div>
      </div>
    </div>`;
  }

  // Check 5-day snooze or explicit suppression (e.g. when payment CTA is primary)
  if(suppressDefault)return'';
  const snoozed=localStorage.getItem(NOTIF_SNOOZE_KEY);
  if(snoozed&&Date.now()-Number(snoozed)<5*24*3600*1000)return'';

  return`<div class="notif-banner">
    <div class="ico">🔔</div>
    <div class="txt">
      <strong>Activá las notificaciones</strong>
      <span>Recibí recordatorios de pago y confirmaciones</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;">
      <button class="btn-notif" onclick="activarNotif()">Activar</button>
      <button class="btn-notif" onclick="snoozeNotif()" style="font-size:10px;font-weight:400;opacity:.75;padding:.15rem .5rem;background:transparent;border-color:rgba(255,255,255,.4);">Ahora no</button>
    </div>
  </div>`;
}

function snoozeNotif(){
  localStorage.setItem(NOTIF_SNOOZE_KEY,Date.now().toString());
  navTo(curPage);
}

async function activarNotif(){
  if(!VAPID_PUBLIC){showToast('Notificaciones no configuradas aún');return;}
  if(!('serviceWorker' in navigator)){showToast('Tu navegador no soporta notificaciones');return;}
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){showToast('Permiso denegado. Habilitá las notificaciones en la configuración del navegador.');navTo(curPage);return;}
    const reg=_swReg||(await navigator.serviceWorker.getRegistration('/panel/sw-alumna.js'));
    if(!reg){showToast('Service worker no disponible');return;}
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC)
    });
    await sb.rpc('triskel_save_push_subscription',{p_subscription:sub.toJSON(),p_tipo:'alumna'});
    localStorage.removeItem(NOTIF_SNOOZE_KEY);
    showToast('🔔 Notificaciones activadas');
    navTo(curPage);
  }catch(e){
    console.error(e);
    showToast('No se pudieron activar las notificaciones');
  }
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

function abrirModalPago(mes){
  avisoPagoMes=mes;
  const[y,m]=mes.split('-');
  const label=new Date(y,m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  document.getElementById('modal-pago-mes-label').textContent='📅 '+label.charAt(0).toUpperCase()+label.slice(1);
  // Pre-cargar monto de la inscripción
  const montoInsc=(STATE.inscripciones||[]).reduce((s,i)=>s+(i.precio||0),0);
  document.getElementById('aviso-monto').value=montoInsc||'';
  document.getElementById('aviso-nota').value='';
  seleccionarMedio('transferencia'); // default
  document.getElementById('modal-pago').style.display='flex';
}

function copiarAlias(){
  navigator.clipboard.writeText('Triskelcasares1').then(()=>{
    const btn=document.getElementById('btn-copiar-alias');
    if(btn){btn.textContent='✓ Copiado';setTimeout(()=>{btn.textContent='📋 Copiar';},2000);}
  }).catch(()=>showToast('No se pudo copiar'));
}

let _medioPago='transferencia';
function seleccionarMedio(m){
  _medioPago=m;
  const tmpl=`flex:1;padding:.6rem;border-radius:var(--radius-sm);border:1.5px solid;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;`;
  const activo=`${tmpl}border-color:var(--tm);background:var(--tm);color:#fff;`;
  const inact=`${tmpl}border-color:var(--border);background:var(--white);color:var(--sub);`;
  document.getElementById('medio-transferencia').style.cssText=m==='transferencia'?activo:inact;
  document.getElementById('medio-efectivo').style.cssText=m==='efectivo'?activo:inact;
}

function cerrarModalPago(){
  document.getElementById('modal-pago').style.display='none';
}

async function confirmarAviso(){
  if(!avisoPagoMes)return;
  const monto=parseFloat(document.getElementById('aviso-monto').value)||null;
  const notaRaw=document.getElementById('aviso-nota').value.trim();
  const medioLabel=_medioPago==='transferencia'?'Transferencia':'Efectivo';
  const nota=notaRaw?`${medioLabel} — ${notaRaw}`:medioLabel;
  const btn=document.querySelector('#modal-pago .btn-confirm');
  btn.disabled=true;btn.textContent='Enviando...';

  const{data,error}=await sb.rpc('triskel_crear_aviso_pago',{
    p_mes:avisoPagoMes,
    p_monto_declarado:monto,
    p_nota:nota
  });

  if(error||!data?.ok){
    showToast('❌ Error al enviar aviso');
    btn.disabled=false;btn.textContent='Avisar pago ✓';
    return;
  }

  // Notify teacher via Edge Function
  try{
    const a=STATE.alumna;
    const{data:{session:sess}}=await sb.auth.getSession();
    await fetch(`${SB_URL}/functions/v1/send-push`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+(sess?.access_token||SB_KEY)
      },
      body:JSON.stringify({
        tipo:'aviso_pago',
        target_tipo:'teacher',
        nombre:a?.nombre||'Una alumna',
        mes:avisoPagoMes,
        monto:monto,
        nota:nota
      })
    });
  }catch(e){console.warn('Push to teacher failed:',e);}

  cerrarModalPago();
  await loadFicha();
  navTo('pagos');
  showToast('✅ Aviso enviado. Amira lo revisará pronto.');
}

// ── FOTO UPLOAD ───────────────────────────────────────────────────────────────

function subirFoto(){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='user';
  input.onchange=async()=>{
    const file=input.files[0];
    if(!file)return;
    if(file.size>3*1024*1024){showToast('La imagen es muy grande (máx 3MB)');return;}
    showToast('Guardando foto...');
    // Redimensionar y convertir a base64
    const base64=await resizeAndEncode(file,600);
    const{data:r}=await sb.rpc('triskel_save_mi_foto',{p_foto_url:base64});
    if(r?.ok){
      STATE.alumna.foto_url=base64;
      showToast('✅ Foto actualizada');
      renderPerfil();
    }else{showToast('Error al guardar foto');}
  };
  input.click();
}

function resizeAndEncode(file,maxSize){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w>h&&w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
      else if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.82));
    };
    img.src=url;
  });
}

// ── TOAST ────────────────────────────────────────────────────────────────────

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

let _darkAlumna = localStorage.getItem('tk-dark') === '1';
if(_darkAlumna) document.documentElement.setAttribute('data-theme','dark');

  _darkAlumna=!_darkAlumna;
  document.documentElement.setAttribute('data-theme',_darkAlumna?'dark':'light');

}
function _initDarkBtn(){
  const btn=document.getElementById('dark-btn-alumna');
  if(btn) btn.textContent=_darkAlumna?'☀️':'🌙';
}

// ── AUSENCIA ─────────────────────────────────────────────────────────────────

let _ausenciaInscId=null;
let _ausenciaFecha=null;
let _ausenciaMotivo='';

function localDateStr(d=new Date()){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function proximaFechaInscripcion(diaKey){
  const dayNum={lun:1,mar:2,mie:3,jue:4,vie:5,sab:6,dom:7};
  const target=dayNum[diaKey];
  if(target===undefined) return localDateStr();
  const hoy=new Date();
  const dow=hoy.getDay()===0?7:hoy.getDay(); // 1=Lun…7=Dom (local)
  let diff=target-dow;
  if(diff<0) diff+=7; // pasó esta semana → próxima semana
  // diff===0 significa hoy → se usa hoy
  const fecha=new Date(hoy);
  fecha.setDate(hoy.getDate()+diff);
  return localDateStr(fecha); // local date, not UTC
}

function fechaLegible(isoDate){
  return new Date(isoDate+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}

function abrirModalAusencia(){
  const inscs=STATE.inscripciones||[];
  if(!inscs.length){showToast('No tenés clases inscriptas');return;}
  _ausenciaInscId=null;_ausenciaFecha=null;_ausenciaMotivo='';
  document.getElementById('ausencia-motivo-texto').value='';
  limpiarChips();

  const inscEl=document.getElementById('modal-ausencia-inscs');
  if(inscs.length===1){
    const i=inscs[0];
    const fecha=proximaFechaInscripcion(i.dia);
    _ausenciaInscId=i.id;_ausenciaFecha=fecha;
    inscEl.innerHTML=`<div style="background:var(--bg);border-radius:var(--radius-sm);padding:.75rem;text-align:center;">
      <div style="font-size:14px;font-weight:700;color:var(--txt);">${i.modalidad.charAt(0).toUpperCase()+i.modalidad.slice(1)} · ${DIA_LABEL[i.dia]||i.dia}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:.2rem;">${i.horario||''} · ${fechaLegible(fecha)}</div>
    </div>`;
  }else{
    inscEl.innerHTML=`<div><div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:.4rem;">¿A cuál clase?</div>
      ${inscs.map(i=>{
        const fecha=proximaFechaInscripcion(i.dia);
        return`<div class="ausencia-insc-opt" data-id="${i.id}" data-fecha="${fecha}" onclick="selAusenciaInsc(this)">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:var(--txt);">${i.modalidad.charAt(0).toUpperCase()+i.modalidad.slice(1)} · ${DIA_LABEL[i.dia]||i.dia}</div>
            <div style="font-size:11px;color:var(--sub);margin-top:.1rem;">${i.horario||''} · ${fechaLegible(fecha)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }
  document.getElementById('modal-ausencia').style.display='flex';
}

function selAusenciaInsc(el){
  document.querySelectorAll('.ausencia-insc-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  _ausenciaInscId=parseInt(el.dataset.id);
  _ausenciaFecha=el.dataset.fecha;
}

function selMotivo(m){
  _ausenciaMotivo=m;
  document.getElementById('ausencia-motivo-texto').value='';
  document.querySelectorAll('.motivo-chip').forEach(c=>{
    c.classList.toggle('sel',c.textContent.trim().includes(m.split(' ')[1]||m));
  });
}

function limpiarChips(){
  _ausenciaMotivo='';
  document.querySelectorAll('.motivo-chip').forEach(c=>c.classList.remove('sel'));
}

function cerrarModalAusencia(){document.getElementById('modal-ausencia').style.display='none';}

async function confirmarAusencia(){
  if(!_ausenciaInscId||!_ausenciaFecha){showToast('Seleccioná la clase que vas a faltar');return;}
  const motivoTexto=document.getElementById('ausencia-motivo-texto').value.trim();
  const motivo=motivoTexto||_ausenciaMotivo||null;
  const btn=document.getElementById('btn-confirmar-ausencia');
  btn.disabled=true;btn.textContent='Enviando...';

  const{data,error}=await sb.rpc('triskel_avisar_ausencia',{
    p_inscripcion_id:_ausenciaInscId,
    p_fecha:_ausenciaFecha,
    p_motivo:motivo
  });

  if(error||!data?.ok){
    showToast('❌ Error al enviar aviso');
    btn.disabled=false;btn.textContent='Avisar ausencia';return;
  }

  // Notificación push a la profe
  try{
    const a=STATE.alumna;
    const{data:{session:sess}}=await sb.auth.getSession();
    const inscObj=(STATE.inscripciones||[]).find(i=>i.id===_ausenciaInscId);
    const claseLabel=inscObj?`${inscObj.modalidad} · ${DIA_LABEL[inscObj.dia]||inscObj.dia}`:'clase';
    await fetch(`${SB_URL}/functions/v1/send-push`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(sess?.access_token||SB_KEY)},
      body:JSON.stringify({tipo:'ausencia',target_tipo:'teacher',nombre:a?.nombre||'Una alumna',clase:claseLabel,fecha:_ausenciaFecha,motivo})
    });
  }catch(e){console.warn('Push failed:',e);}

  cerrarModalAusencia();
  btn.disabled=false;btn.textContent='Avisar ausencia';
  showToast('✅ Aviso enviado — ¡hasta la próxima!');
}
